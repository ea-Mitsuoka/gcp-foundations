name: Terraform Apply on Merge

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'gcp_foundations.xlsx'
      - 'domain.env'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for GCP Workload Identity Federation

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # NOTE: GCP Workload Identity Federation is required for passwordless authentication.
      # Configure this step with your actual WIF provider and Service Account.
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github/providers/my-repo'
      #     service_account: 'terraform-org-manager@your-tfstate-project.iam.gserviceaccount.com'

      - name: Generate Terraform variables and backend config
        run: |
          cat <<EOF > terraform/common.tfbackend
          bucket = "${{ secrets.GCS_BACKEND_BUCKET || 'dummy-bucket-for-ci' }}"
          EOF

          cat <<EOF > terraform/common.tfvars
          terraform_service_account_email = "${{ secrets.TF_SERVICE_ACCOUNT_EMAIL || 'dummy-sa@example.com' }}"
          gcs_backend_bucket              = "${{ secrets.GCS_BACKEND_BUCKET || 'dummy-bucket-for-ci' }}"
          organization_domain             = "${{ secrets.ORGANIZATION_DOMAIN || 'example.com' }}"
          gcp_region                      = "${{ secrets.GCP_REGION || 'asia-northeast1' }}"
          project_id_prefix               = "${{ secrets.PROJECT_ID_PREFIX || 'example' }}"
          core_billing_linked             = ${{ secrets.CORE_BILLING_LINKED || 'false' }}
          enable_vpc_host_projects        = ${{ secrets.ENABLE_VPC || 'false' }}
          enable_shared_vpc               = ${{ secrets.ENABLE_VPC || 'false' }}
          EOF

      - name: Run Terraform Apply via script
        run: |
          bash terraform/scripts/deploy_all.sh --resume
        env:
          TF_IN_AUTOMATION: "true"
