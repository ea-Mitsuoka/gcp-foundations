name: Terraform PR Plan and Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'gcp-foundations.xlsx'
      - 'domain.env'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write # Required for GCP Workload Identity Federation

jobs:
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true # Set to false to block PRs on security issues

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      # NOTE: GCP Workload Identity Federation is required for passwordless authentication.
      # Uncomment the following step after registering GCP_WIF_PROVIDER and TF_SERVICE_ACCOUNT_EMAIL in GitHub Secrets.
      # See docs/operations/operational_takeover.md for setup instructions.
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
      #     service_account: '${{ secrets.TF_SERVICE_ACCOUNT_EMAIL }}'

      - name: Generate Terraform variables and backend config
        run: |
          cat <<EOF > terraform/common.tfbackend
          bucket = "${{ secrets.GCS_BACKEND_BUCKET || 'dummy-bucket-for-ci' }}"
          EOF

          cat <<EOF > terraform/common.tfvars
          terraform_service_account_email = "${{ secrets.TF_SERVICE_ACCOUNT_EMAIL || 'dummy-sa@example.com' }}"
          gcs_backend_bucket              = "${{ secrets.GCS_BACKEND_BUCKET || 'dummy-bucket-for-ci' }}"
          organization_domain             = "${{ secrets.ORGANIZATION_DOMAIN || 'example.com' }}"
          billing_account_id              = "${{ secrets.BILLING_ACCOUNT_ID || '012345-6789AB-CDEF01' }}"
          gcp_region                      = "${{ secrets.GCP_REGION || 'asia-northeast1' }}"
          project_id_prefix               = "${{ secrets.PROJECT_ID_PREFIX || 'example' }}"
          enable_vpc_host_projects        = ${{ secrets.ENABLE_VPC || 'false' }}
          enable_shared_vpc               = ${{ secrets.ENABLE_VPC || 'false' }}
          enable_vpc_sc                   = ${{ secrets.ENABLE_VPC_SC || 'false' }}
          enable_org_policies             = ${{ secrets.ENABLE_ORG_POLICIES || 'false' }}
          enable_tags                     = ${{ secrets.ENABLE_TAGS || 'false' }}
          enable_simplified_admin_groups  = ${{ secrets.ENABLE_SIMPLIFIED_ADMIN_GROUPS || 'false' }}
          allow_resource_destruction      = false
          EOF

      - name: Run Terraform Plan via script
        run: |
          bash terraform/scripts/deploy_all.sh --plan-only
        env:
          # This allows terraform to run without prompting if credentials are valid
          TF_IN_AUTOMATION: "true"
