name: Terraform PR Plan and Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'gcp_foundations.xlsx'
      - 'domain.env'

permissions:
  contents: read
  pull-requests: write
  id-token: write # Required for GCP Workload Identity Federation

jobs:
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true # Set to false to block PRs on security issues

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # NOTE: GCP Workload Identity Federation is required for passwordless authentication.
      # Uncomment and configure the following step to enable actual planning against GCP.
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github/providers/my-repo'
      #     service_account: 'terraform-org-manager@your-tfstate-project.iam.gserviceaccount.com'

      - name: Run Terraform Plan via script
        run: |
          bash terraform/scripts/deploy_all.sh --plan-only
        env:
          # This allows terraform to run without prompting if credentials are valid
          TF_IN_AUTOMATION: "true"
