# This workflow runs checks for Terraform code quality.
#
# It is triggered on:
# - Pull requests targeting the main branch (for .tf and .tfvars files)
# - Pushes to the main branch (for .tf and .tfvars files)
# - Manual execution (workflow_dispatch)
#
name: Terraform Lint

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.md' # For terraform-docs
      - '.github/workflows/**'
      - 'terraform/scripts/**'
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.md' # For terraform-docs
      - '.github/workflows/**'
      - 'terraform/scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ####################################################
  # Job 1: Run format check and static analysis
  ####################################################
  lint:
    name: Terraform Format and TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Generate Terraform Code from SSoT
        run: |
          # Create a minimal dummy domain.env and Excel if they don't exist
          echo 'domain="example.com"' > domain.env
          make generate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Run Python Unit Tests
        run: uv run pytest tests/

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

  ####################################################
  # Job 2: Discover Terraform root directories (for validate job)
  ####################################################
  discover:
    name: Discover Terraform Root Modules
    runs-on: ubuntu-latest
    needs: [lint] # Wait for code generation in lint job (though we need to repeat it in validate)
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Generate Terraform Code
        run: |
          echo 'domain="example.com"' > domain.env
          uv run terraform/scripts/generate_resources.py

      - name: Build validation matrix
        id: discover
        shell: bash
        run: |
          mapfile -t dirs < <(
            find terraform -type f -name '*.tf' \
              -not -path '*/.terraform/*' \
              -not -path 'terraform/modules/*' \
              -printf '%h\n' | sort -u
          )

          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"working-directory":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -cs '{"working-directory": .}')"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  ####################################################
  # Job 3: Discover Terraform modules (for docs job)
  ####################################################
  discover-modules:
    name: Discover Terraform Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docs matrix
        id: discover
        shell: bash
        run: |
          mapfile -t dirs < <(
            find terraform/modules -mindepth 1 -maxdepth 1 -type d
          )

          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"working-directory":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          matrix_json="$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -cs '{"working-directory": .}')"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  ####################################################
  # Job 4: Validate all Terraform root modules
  ####################################################
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [lint, discover]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Generate Terraform Code
        run: |
          echo 'domain="example.com"' > domain.env
          uv run terraform/scripts/generate_resources.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform init -backend=false -upgrade
        working-directory: ${{ matrix.working-directory }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.working-directory }}

  ####################################################
  # Job 5: Check all Terraform module READMEs
  ####################################################
  docs:
    name: Check Terraform Module Docs
    runs-on: ubuntu-latest
    needs: [lint, discover-modules]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check module README
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: ${{ matrix.working-directory }}
          output-file: README.md
          output-check: "true"
          git-push: "false"

  ####################################################
  # Job 6: Run terraform test for modules
  ####################################################
  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    needs: [lint, discover-modules]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.working-directory }}

      - name: Terraform Test
        run: terraform test
        working-directory: ${{ matrix.working-directory }}

  ####################################################
  # Job 7: Check OPA policies (Rego)
  ####################################################
  opa-check:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA Check
        run: opa check policies/*.rego

  ####################################################
  # Job 8: Shellcheck for Bash scripts
  ####################################################
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './terraform/scripts'
          severity: style
