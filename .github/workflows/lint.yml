# This workflow runs checks for Terraform code quality.
#
# It is triggered on:
# - Pull requests targeting the main branch (for .tf and .tfvars files)
# - Pushes to the main branch (for .tf and .tfvars files)
# - Manual execution (workflow_dispatch)
#
name: Terraform Lint

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.md' # For terraform-docs
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '**.md' # For terraform-docs
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  ####################################################
  # Job 1: Run format check and static analysis
  ####################################################
  lint:
    name: Terraform Format and TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Create dummy CSV files for TFLint
        run: |
          echo "log_type,filter,destination_type,destination_parent,retention_days" > terraform/1_core/services/logsink/sinks/gcp_log_sink_config.csv
          echo "user_email,receive_alerts,project_id,alert_name" > terraform/1_core/services/monitoring/1_notification_channels/notifications.csv
          echo "alert_name,alert_display_name,metric_filter,alert_documentation" > terraform/1_core/services/monitoring/2_alert_policies/logsink_log_alerts/alert_definitions.csv
          echo "user_email,receive_alerts,project_id,alert_name" > terraform/1_core/services/monitoring/2_alert_policies/logsink_log_alerts/notifications.csv
          
          # Also create them in the root since tflint resolves paths relative to where it runs when using --recursive
          echo "user_email,receive_alerts,project_id,alert_name" > notifications.csv
          echo "alert_name,alert_display_name,metric_filter,alert_documentation" > alert_definitions.csv

      - name: Run TFLint
        run: tflint --recursive

  ####################################################
  # Job 2: Discover Terraform root directories (for validate job)
  ####################################################
  discover:
    name: Discover Terraform Root Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build validation matrix
        id: discover
        shell: bash
        run: |
          mapfile -t dirs < <(
            find terraform -type f -name '*.tf' \
              -not -path '*/.terraform/*' \
              -not -path 'terraform/modules/*' \
              -printf '%h\n' | sort -u
          )

          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"working-directory":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json="$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -cs '{"working-directory": .}')"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  ####################################################
  # Job 3: Discover Terraform modules (for docs job)
  ####################################################
  discover-modules:
    name: Discover Terraform Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docs matrix
        id: discover
        shell: bash
        run: |
          mapfile -t dirs < <(
            find terraform/modules -mindepth 1 -maxdepth 1 -type d
          )

          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"working-directory":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          matrix_json="$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -cs '{"working-directory": .}')"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  ####################################################
  # Job 4: Validate all Terraform root modules
  ####################################################
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [lint, discover]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy CSV for validation
        if: matrix.working-directory == 'terraform/1_core/services/logsink/sinks'
        run: echo "log_type,filter,destination_type,destination_parent,retention_days" > gcp_log_sink_config.csv
        working-directory: ${{ matrix.working-directory }}

      - name: Create dummy CSV for notification channels validation
        if: matrix.working-directory == 'terraform/1_core/services/monitoring/1_notification_channels'
        run: echo "user_email,receive_alerts,project_id,alert_name" > notifications.csv
        working-directory: ${{ matrix.working-directory }}

      - name: Create dummy CSV for log alerts validation
        if: matrix.working-directory == 'terraform/1_core/services/monitoring/2_alert_policies/logsink_log_alerts'
        run: echo "alert_name,alert_display_name,metric_filter,alert_documentation" > alert_definitions.csv && echo "user_email,receive_alerts,project_id,alert_name" > notifications.csv
        working-directory: ${{ matrix.working-directory }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform init -backend=false -upgrade
        working-directory: ${{ matrix.working-directory }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.working-directory }}

  ####################################################
  # Job 5: Check all Terraform module READMEs
  ####################################################
  docs:
    name: Check Terraform Module Docs
    runs-on: ubuntu-latest
    needs: [lint, discover-modules]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check module README
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: ${{ matrix.working-directory }}
          output-file: README.md
          output-check: "true"
          git-push: "false"

  ####################################################
  # Job 6: Run terraform test for modules
  ####################################################
  test:
    name: Terraform Test
    runs-on: ubuntu-latest
    needs: [lint, discover-modules]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-modules.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.working-directory }}

      - name: Terraform Test
        run: terraform test
        working-directory: ${{ matrix.working-directory }}
